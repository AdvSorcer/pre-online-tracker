services:
  backend:
    build:
      context: ./backend
    environment:
      SIMPLE_PASSWORD: "2026"
      APP_TOKEN: local-token
      DB_PATH: /app/data/pre-online-tracker.db
      UPLOAD_DIR: /app/uploads
      PORT: 3000
    expose:
      - "3000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-7005}:80"
    depends_on:
      - backend
